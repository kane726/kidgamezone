<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kid Game Zone</title>
<!-- Crossword update v2: continuous typing, hint, reveal clue, reveal puzzle -->
<style>
  :root {
    --purple: #6c63ff;
    --blue: #4dabf7;
    --yellow: #ffd43b;
    --green: #38b000;
    --red: #ff6b6b;
    --dark: #263238;
    --light: #fff7d6;
    --card: #ffffff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Trebuchet MS", Arial, sans-serif;
    background: linear-gradient(135deg, #fff7d6, #e7f5ff);
    color: var(--dark);
  }

  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px;
  }

  header {
    background: linear-gradient(135deg, var(--purple), var(--blue));
    color: white;
    border-radius: 22px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,.15);
  }

  h1 { margin: 0; font-size: 2.4rem; }
  h2 { margin: 8px 0; }

  .js-check {
    margin: 12px auto 0;
    display: inline-block;
    background: #ffe3e3;
    color: #9b2226;
    padding: 8px 12px;
    border-radius: 999px;
    font-weight: 800;
  }

  .js-check.ready {
    background: #d3f9d8;
    color: #1b7f4b;
  }

  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin: 16px 0;
  }

  .tab {
    border: 0;
    border-radius: 999px;
    background: white;
    color: var(--purple);
    padding: 12px 18px;
    font-weight: 900;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 5px 12px rgba(0,0,0,.12);
  }

  .tab.active {
    background: var(--purple);
    color: white;
  }

  .panel {
    display: none;
    background: rgba(255,255,255,.9);
    border: 3px solid white;
    border-radius: 22px;
    padding: 16px;
    box-shadow: 0 8px 22px rgba(0,0,0,.12);
  }

  .panel.active { display: block; }

  .game-top {
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: end;
  }

  label {
    display: grid;
    gap: 4px;
    font-weight: 800;
    color: #546e7a;
  }

  select {
    border: 2px solid #cfd8dc;
    border-radius: 12px;
    padding: 10px;
    font-size: 1rem;
    font-weight: 700;
    background: white;
  }

  button, select, input {
    font-family: inherit;
  }

  .play, .reset {
    border: 0;
    border-radius: 14px;
    color: white;
    padding: 12px 16px;
    font-weight: 900;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 5px 12px rgba(0,0,0,.15);
  }

  .play { background: var(--green); }
  .reset { background: var(--red); }

  .status {
    background: #eef7ff;
    border: 2px dashed #90caf9;
    border-radius: 16px;
    padding: 10px;
    margin: 10px 0 16px;
    font-weight: 800;
    min-height: 44px;
  }

  /* Memory */
  #memoryBoard {
    display: grid;
    grid-template-columns: repeat(5, minmax(50px, 1fr));
    gap: 10px;
    max-width: 650px;
    margin: 0 auto;
  }

  .memory-card {
    aspect-ratio: 1 / 1;
    border: 0;
    border-radius: 18px;
    background: linear-gradient(135deg, #6c63ff, #c084fc);
    color: white;
    font-size: clamp(2rem, 8vw, 3.2rem);
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(0,0,0,.15);
  }

  .memory-card.showing {
    background: linear-gradient(135deg, #ffd43b, #ff922b);
  }

  .memory-card.matched {
    background: linear-gradient(135deg, #38b000, #80ed99);
  }

  .memory-card:disabled {
    opacity: .75;
    cursor: not-allowed;
  }


  .memory-wrap {
    position: relative;
    max-width: 650px;
    margin: 0 auto;
  }

  #memoryBoard {
    position: relative;
    z-index: 1;
  }

  .memory-countdown {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 999;
    pointer-events: none;
    align-items: center;
    justify-content: center;
    background: rgba(255, 247, 214, 0.18);
  }

  .memory-countdown.show {
    display: flex !important;
  }

  .memory-countdown span {
    width: clamp(95px, 26vw, 155px);
    height: clamp(95px, 26vw, 155px);
    border-radius: 999px;
    display: grid;
    place-items: center;
    background: rgba(255, 255, 255, 0.94);
    color: #5148d8;
    font-size: clamp(3.4rem, 17vw, 6.4rem);
    font-weight: 900;
    border: 7px solid #ffd43b;
    box-shadow: 0 12px 28px rgba(0,0,0,.28);
  }

  /* Crossword */
var cwRows = [
  "MATH#PIG",
  "I##E#E##",
  "LION#NET",
  "K#######",
  "FROG#BED",
  "I####U##",
  "STAR#SEA",
  "H#######"
];

var cwNumbers = {
  "0-0": 1, "0-3": 2, "0-5": 3, "2-0": 4, "2-5": 5,
  "4-0": 6, "4-5": 7, "6-0": 8, "6-5": 9
};

var cwAcross = [
  [1, { easy: "School subject with adding and subtracting.", medium: "The subject where you solve number problems.", hard: "Numbers, shapes, and problem-solving class." }],
  [3, { easy: "Farm animal that says oink.", medium: "A pink farm animal.", hard: "An animal that may roll in mud." }],
  [4, { easy: "Big cat with a loud roar.", medium: "A wild animal called the king of the jungle.", hard: "A big cat with a mane." }],
  [5, { easy: "You might catch a butterfly with this.", medium: "A tool for catching or holding things.", hard: "A web-like thing used in some sports." }],
  [6, { easy: "Green animal that jumps and says ribbit.", medium: "An animal that starts as a tadpole.", hard: "A hopping amphibian." }],
  [7, { easy: "Where you sleep.", medium: "A place to rest at night.", hard: "A piece of furniture used for sleeping." }],
  [8, { easy: "A bright shape you see in the night sky.", medium: "Something that twinkles in space.", hard: "A faraway ball of glowing gas." }],
  [9, { easy: "A big area of salty water.", medium: "Another word for ocean water.", hard: "A large body of salt water." }]
];

var cwDown = [
  [1, { easy: "White drink that often comes from cows.", medium: "A drink many kids have with cereal.", hard: "A dairy drink." }],
  [2, { easy: "A grown-up female chicken.", medium: "A farm bird that can lay eggs.", hard: "An egg-laying chicken." }],
  [3, { easy: "You write with this.", medium: "A writing tool that uses ink.", hard: "An ink tool used for writing." }],
  [6, { easy: "Animal that swims in water.", medium: "A water animal with fins.", hard: "An animal that uses gills." }],
  [7, { easy: "A big vehicle that takes kids to school.", medium: "A vehicle many students ride.", hard: "Public transportation with many seats." }]
];

var cwEntries = [
  { number: 1, direction: "across", answer: "MATH", cells: [[0,0],[0,1],[0,2],[0,3]] },
  { number: 3, direction: "across", answer: "PIG", cells: [[0,5],[0,6],[0,7]] },
  { number: 4, direction: "across", answer: "LION", cells: [[2,0],[2,1],[2,2],[2,3]] },
  { number: 5, direction: "across", answer: "NET", cells: [[2,5],[2,6],[2,7]] },
  { number: 6, direction: "across", answer: "FROG", cells: [[4,0],[4,1],[4,2],[4,3]] },
  { number: 7, direction: "across", answer: "BED", cells: [[4,5],[4,6],[4,7]] },
  { number: 8, direction: "across", answer: "STAR", cells: [[6,0],[6,1],[6,2],[6,3]] },
  { number: 9, direction: "across", answer: "SEA", cells: [[6,5],[6,6],[6,7]] },
  { number: 1, direction: "down", answer: "MILK", cells: [[0,0],[1,0],[2,0],[3,0]] },
  { number: 2, direction: "down", answer: "HEN", cells: [[0,3],[1,3],[2,3]] },
  { number: 3, direction: "down", answer: "PEN", cells: [[0,5],[1,5],[2,5]] },
  { number: 6, direction: "down", answer: "FISH", cells: [[4,0],[5,0],[6,0],[7,0]] },
  { number: 7, direction: "down", answer: "BUS", cells: [[4,5],[5,5],[6,5]] }
];

var cwEnabled = false;
var activeCwEntry = null;

function startCrossword() {
  cwEnabled = true;
  activeCwEntry = null;
  renderCrossword(true);
  renderClues();
  getEl("crosswordStatus").innerHTML = "Click a clue, then type the answer. Letters will move through that clue automatically.";
}

function resetCrossword() {
  cwEnabled = false;
  activeCwEntry = null;
  renderCrossword(false);
  renderClues();
  getEl("crosswordStatus").innerHTML = "Press Play to start.";
}

function renderCrossword(enabled) {
  var board = getEl("crosswordBoard");
  board.innerHTML = "";

  for (var r = 0; r < cwRows.length; r++) {
    for (var c = 0; c < cwRows[r].length; c++) {
      var letter = cwRows[r].charAt(c);

      if (letter === "#") {
        var black = document.createElement("div");
        black.className = "black";
        board.appendChild(black);
      } else {
        var cell = document.createElement("div");
        cell.className = "white";
        cell.setAttribute("data-row", r);
        cell.setAttribute("data-col", c);

        var number = cwNumbers[r + "-" + c];
        if (number) {
          var numSpan = document.createElement("span");
          numSpan.className = "num";
          numSpan.innerHTML = number;
          cell.appendChild(numSpan);
        }

        var input = document.createElement("input");
        input.className = "cw-input";
        input.maxLength = 1;
        input.disabled = !enabled;
        input.autocapitalize = "characters";
        input.autocomplete = "off";
        input.autocorrect = "off";
        input.spellcheck = false;
        input.setAttribute("inputmode", "text");
        input.setAttribute("data-answer", letter);
        input.setAttribute("data-row", r);
        input.setAttribute("data-col", c);

        input.onclick = function() {
          var found = findBestEntryForCell(this.getAttribute("data-row"), this.getAttribute("data-col"));
          if (found) {
            selectCwEntry(found.direction, found.number, false);
          }
        };

        input.onkeydown = function(event) {
          if (!cwEnabled) return;

          if (!activeCwEntry) {
            var found = findBestEntryForCell(this.getAttribute("data-row"), this.getAttribute("data-col"));
            if (found) selectCwEntry(found.direction, found.number, false);
          }

          if (event.key === "Backspace") {
            if (this.value !== "") {
              this.value = "";
              event.preventDefault();
              checkCrossword(false);
              return;
            }

            var previous = getPreviousCwInput(this);
            if (previous) {
              event.preventDefault();
              previous.focus();
              previous.value = "";
              checkCrossword(false);
            }
            return;
          }

          if (event.key && event.key.length === 1 && /[a-zA-Z]/.test(event.key)) {
            event.preventDefault();
            this.value = event.key.toUpperCase();
            this.parentNode.className = this.parentNode.className.replace(" correct", "").replace(" wrong", "");
            moveToNextCwCell(this);
            checkCrossword(false);
          }
        };

        input.oninput = function() {
          if (!cwEnabled) return;

          var value = this.value.replace(/[^a-zA-Z]/g, "").toUpperCase();
          this.value = value.slice(-1);

          this.parentNode.className = this.parentNode.className.replace(" correct", "").replace(" wrong", "");

          if (!activeCwEntry) {
            var found = findBestEntryForCell(this.getAttribute("data-row"), this.getAttribute("data-col"));
            if (found) selectCwEntry(found.direction, found.number, false);
          }

          if (this.value.length === 1) {
            var current = this;
            setTimeout(function() {
              moveToNextCwCell(current);
            }, 0);
          }

          checkCrossword(false);
        };

        cell.appendChild(input);
        board.appendChild(cell);
      }
    }
  }
}

function renderClues() {
  var level = getEl("crosswordDifficulty").value;
  var across = getEl("acrossClues");
  var down = getEl("downClues");
  across.innerHTML = "";
  down.innerHTML = "";

  for (var i = 0; i < cwAcross.length; i++) {
    var li = document.createElement("li");
    li.value = cwAcross[i][0];
    li.innerHTML = cwAcross[i][1][level];
    li.setAttribute("data-number", cwAcross[i][0]);
    li.setAttribute("data-direction", "across");
    li.onclick = function() {
      selectCwEntry(this.getAttribute("data-direction"), parseInt(this.getAttribute("data-number"), 10), true);
    };
    across.appendChild(li);
  }

  for (var j = 0; j < cwDown.length; j++) {
    var li2 = document.createElement("li");
    li2.value = cwDown[j][0];
    li2.innerHTML = cwDown[j][1][level];
    li2.setAttribute("data-number", cwDown[j][0]);
    li2.setAttribute("data-direction", "down");
    li2.onclick = function() {
      selectCwEntry(this.getAttribute("data-direction"), parseInt(this.getAttribute("data-number"), 10), true);
    };
    down.appendChild(li2);
  }

  if (activeCwEntry) {
    markActiveClue();
  }
}

function getCwEntry(direction, number) {
  for (var i = 0; i < cwEntries.length; i++) {
    if (cwEntries[i].direction === direction && cwEntries[i].number === number) {
      return cwEntries[i];
    }
  }
  return null;
}

function selectCwEntry(direction, number, showMessage) {
  if (!cwEnabled) {
    cwEnabled = true;
    renderCrossword(true);
    renderClues();
  }

  var entry = getCwEntry(direction, number);
  if (!entry) return;

  activeCwEntry = entry;
  clearCwHighlights();
  markActiveClue();

  for (var i = 0; i < entry.cells.length; i++) {
    var cell = getCwCell(entry.cells[i][0], entry.cells[i][1]);
    if (cell && cell.className.indexOf("active") < 0) {
      cell.className += " active";
    }
  }

  var focusInput = getFirstEmptyInputForEntry(entry);
  if (!focusInput) {
    focusInput = getCwInput(entry.cells[0][0], entry.cells[0][1]);
  }

  if (focusInput) {
    focusInput.focus();
    try {
      focusInput.setSelectionRange(0, focusInput.value.length);
    } catch (e) {}
  }

  if (showMessage !== false) {
    getEl("crosswordStatus").innerHTML = "Selected " + number + " " + direction + ". Type the answer continuously.";
  }
}

function clearCwHighlights() {
  var cells = document.getElementsByClassName("white");
  for (var i = 0; i < cells.length; i++) {
    cells[i].className = cells[i].className.replace(" active", "");
  }

  var clues = document.querySelectorAll(".clue-box li");
  for (var j = 0; j < clues.length; j++) {
    clues[j].className = clues[j].className.replace(" active-clue", "");
  }
}

function markActiveClue() {
  if (!activeCwEntry) return;

  var clues = document.querySelectorAll(".clue-box li");
  for (var i = 0; i < clues.length; i++) {
    var direction = clues[i].getAttribute("data-direction");
    var number = parseInt(clues[i].getAttribute("data-number"), 10);

    if (direction === activeCwEntry.direction && number === activeCwEntry.number) {
      if (clues[i].className.indexOf("active-clue") < 0) {
        clues[i].className += " active-clue";
      }
    }
  }
}

function getCwCell(row, col) {
  return document.querySelector('.white[data-row="' + row + '"][data-col="' + col + '"]');
}

function getCwInput(row, col) {
  return document.querySelector('.cw-input[data-row="' + row + '"][data-col="' + col + '"]');
}

function getFirstEmptyInputForEntry(entry) {
  for (var i = 0; i < entry.cells.length; i++) {
    var input = getCwInput(entry.cells[i][0], entry.cells[i][1]);
    if (input && input.value === "") return input;
  }
  return null;
}

function getFirstNotCorrectInputForEntry(entry) {
  for (var i = 0; i < entry.cells.length; i++) {
    var input = getCwInput(entry.cells[i][0], entry.cells[i][1]);
    if (input && input.value !== input.getAttribute("data-answer")) return input;
  }
  return null;
}

function getActiveCellIndex(input) {
  if (!activeCwEntry) return -1;

  var row = parseInt(input.getAttribute("data-row"), 10);
  var col = parseInt(input.getAttribute("data-col"), 10);

  for (var i = 0; i < activeCwEntry.cells.length; i++) {
    if (activeCwEntry.cells[i][0] === row && activeCwEntry.cells[i][1] === col) {
      return i;
    }
  }

  return -1;
}

function moveToNextCwCell(input) {
  if (!activeCwEntry) return;

  var index = getActiveCellIndex(input);
  if (index < 0) return;

  var nextCell = activeCwEntry.cells[index + 1];
  if (!nextCell) {
    input.blur();
    return;
  }

  var nextInput = getCwInput(nextCell[0], nextCell[1]);
  if (nextInput) {
    nextInput.focus();
    try {
      nextInput.setSelectionRange(0, nextInput.value.length);
    } catch (e) {}
  }
}

function getPreviousCwInput(input) {
  var index = getActiveCellIndex(input);
  if (index <= 0) return null;

  var previousCell = activeCwEntry.cells[index - 1];
  return getCwInput(previousCell[0], previousCell[1]);
}

function findBestEntryForCell(row, col) {
  row = parseInt(row, 10);
  col = parseInt(col, 10);

  if (activeCwEntry) {
    for (var a = 0; a < activeCwEntry.cells.length; a++) {
      if (activeCwEntry.cells[a][0] === row && activeCwEntry.cells[a][1] === col) {
        return activeCwEntry;
      }
    }
  }

  for (var i = 0; i < cwEntries.length; i++) {
    for (var j = 0; j < cwEntries[i].cells.length; j++) {
      if (cwEntries[i].cells[j][0] === row && cwEntries[i].cells[j][1] === col) {
        return cwEntries[i];
      }
    }
  }

  return null;
}

function hintSelectedClue() {
  if (!activeCwEntry) {
    getEl("crosswordStatus").innerHTML = "Click a clue first, then use Hint.";
    return;
  }

  var input = getFirstNotCorrectInputForEntry(activeCwEntry);
  if (!input) {
    getEl("crosswordStatus").innerHTML = "This clue is already filled correctly.";
    return;
  }

  input.value = input.getAttribute("data-answer");
  input.parentNode.className = input.parentNode.className.replace(" wrong", "").replace(" correct", "");
  input.parentNode.className += " correct";

  selectCwEntry(activeCwEntry.direction, activeCwEntry.number, false);
  var nextInput = getFirstNotCorrectInputForEntry(activeCwEntry);
  if (nextInput) {
    nextInput.focus();
  }

  getEl("crosswordStatus").innerHTML = "Hint added for " + activeCwEntry.number + " " + activeCwEntry.direction + ".";
  checkCrossword(false);
}

function revealSelectedClue() {
  if (!activeCwEntry) {
    getEl("crosswordStatus").innerHTML = "Click a clue first, then use Reveal Selected Clue.";
    return;
  }

  for (var i = 0; i < activeCwEntry.cells.length; i++) {
    var input = getCwInput(activeCwEntry.cells[i][0], activeCwEntry.cells[i][1]);
    if (input) {
      input.value = input.getAttribute("data-answer");
      input.parentNode.className = input.parentNode.className.replace(" wrong", "").replace(" correct", "");
      input.parentNode.className += " correct";
    }
  }

  selectCwEntry(activeCwEntry.direction, activeCwEntry.number, false);
  getEl("crosswordStatus").innerHTML = "Revealed " + activeCwEntry.number + " " + activeCwEntry.direction + ".";
  checkCrossword(false);
}

function revealPuzzle() {
  if (!cwEnabled) {
    cwEnabled = true;
    renderCrossword(true);
    renderClues();
  }

  var inputs = document.getElementsByClassName("cw-input");
  for (var i = 0; i < inputs.length; i++) {
    inputs[i].value = inputs[i].getAttribute("data-answer");
    inputs[i].parentNode.className = "white correct";
  }

  activeCwEntry = null;
  clearCwHighlights();
  getEl("crosswordStatus").innerHTML = "Puzzle revealed. All answers are filled in.";
}

function checkCrossword(showIncompleteMessage) {
  var inputs = document.getElementsByClassName("cw-input");
  var allFilled = true;
  var allCorrect = true;

  for (var i = 0; i < inputs.length; i++) {
    if (inputs[i].value.length === 0) {
      allFilled = false;
      break;
    }
  }

  if (!allFilled) {
    if (showIncompleteMessage) {
      getEl("crosswordStatus").innerHTML = "Keep going. Fill every white box.";
    }
    return;
  }

  clearCwHighlights();

  for (var j = 0; j < inputs.length; j++) {
    if (inputs[j].value === inputs[j].getAttribute("data-answer")) {
      inputs[j].parentNode.className = "white correct";
    } else {
      inputs[j].parentNode.className = "white wrong";
      allCorrect = false;
    }
  }

  if (allCorrect) {
    getEl("crosswordStatus").innerHTML = "🎉 Crossword complete! Every answer is correct.";
  } else {
    getEl("crosswordStatus").innerHTML = "Almost there. Red boxes need another try.";
  }
}

function startHangman() {
  var difficulty = getEl("hangmanDifficulty").value;
  var category = getEl("hangmanCategory").value;
  var options = [];
  var cats = ["animals", "school", "magic", "sports"];

  maxWrong = difficulty === "easy" ? 8 : difficulty === "medium" ? 7 : 6;

  if (category === "mixed") {
    for (var i = 0; i < cats.length; i++) {
      var catWords = wordBank[difficulty][cats[i]];
      for (var j = 0; j < catWords.length; j++) {
        options.push({ word: catWords[j], category: cats[i] });
      }
    }
  } else {
    var words = wordBank[difficulty][category];
    for (var k = 0; k < words.length; k++) {
      options.push({ word: words[k], category: category });
    }
  }

  var pick = options[Math.floor(Math.random() * options.length)];
  currentWord = pick.word;
  currentCategory = pick.category;
  guessed = [];
  wrong = 0;
  hangmanStarted = true;

  getEl("hangmanHint").innerHTML = "Hint: " + categoryLabels[currentCategory];
  getEl("hangmanStatus").innerHTML = "Wrong guesses: 0/" + maxWrong;
  renderHangman();
}

function resetHangman() {
  currentWord = "";
  currentCategory = "";
  guessed = [];
  wrong = 0;
  maxWrong = 7;
  hangmanStarted = false;
  getEl("hangmanHint").innerHTML = "Hint will show here.";
  getEl("hangmanStatus").innerHTML = "Press Play to start.";
  renderHangman();
}

function renderHangman() {
  renderWord();
  renderKeyboard();
  renderDrawing();
}

function renderWord() {
  var display = getEl("wordDisplay");
  display.innerHTML = "";

  if (currentWord === "") {
    var blank = document.createElement("div");
    blank.className = "slot";
    blank.innerHTML = "?";
    display.appendChild(blank);
    return;
  }

  for (var i = 0; i < currentWord.length; i++) {
    var ch = currentWord.charAt(i);
    if (ch === " " || ch === "-") {
      var space = document.createElement("div");
      space.className = "space";
      display.appendChild(space);
    } else {
      var slot = document.createElement("div");
      slot.className = "slot";
      slot.innerHTML = guessed.indexOf(ch) >= 0 ? ch : "";
      display.appendChild(slot);
    }
  }
}

function renderKeyboard() {
  var keyboard = getEl("keyboard");
  keyboard.innerHTML = "";

  var alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  for (var i = 0; i < alphabet.length; i++) {
    var letter = alphabet.charAt(i);
    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "key";
    btn.innerHTML = letter;
    btn.setAttribute("data-letter", letter);

    if (!hangmanStarted || guessed.indexOf(letter) >= 0 || isHangmanDone()) {
      btn.disabled = true;
    }

    if (guessed.indexOf(letter) >= 0) {
      if (currentWord.indexOf(letter) >= 0) btn.className = "key good";
      else btn.className = "key bad";
    }

    btn.onclick = function() {
      guessLetter(this.getAttribute("data-letter"));
    };

    keyboard.appendChild(btn);
  }
}

function guessLetter(letter) {
  if (!hangmanStarted) return;
  if (guessed.indexOf(letter) >= 0) return;
  if (isHangmanDone()) return;

  guessed.push(letter);

  if (currentWord.indexOf(letter) < 0) {
    wrong++;
  }

  if (isHangmanWon()) {
    getEl("hangmanStatus").innerHTML = "🎉 You got it! The word was " + currentWord + ".";
  } else if (wrong >= maxWrong) {
    revealWordLetters();
    getEl("hangmanStatus").innerHTML = "Good try! The word was " + currentWord + ". Press Play for a new word.";
  } else {
    getEl("hangmanStatus").innerHTML = "Wrong guesses: " + wrong + "/" + maxWrong;
  }

  renderHangman();
}

function revealWordLetters() {
  for (var i = 0; i < currentWord.length; i++) {
    var ch = currentWord.charAt(i);
    if (ch >= "A" && ch <= "Z" && guessed.indexOf(ch) < 0) {
      guessed.push(ch);
    }
  }
}

function isHangmanWon() {
  if (currentWord === "") return false;
  for (var i = 0; i < currentWord.length; i++) {
    var ch = currentWord.charAt(i);
    if (ch >= "A" && ch <= "Z" && guessed.indexOf(ch) < 0) {
      return false;
    }
  }
  return true;
}

function isHangmanDone() {
  return isHangmanWon() || (hangmanStarted && wrong >= maxWrong);
}

function renderDrawing() {
  for (var i = 1; i <= 6; i++) {
    getEl("part" + i).className.baseVal = "hidden-part";
  }

  var partsToShow = Math.ceil((wrong / maxWrong) * 6);
  for (var j = 1; j <= partsToShow; j++) {
    getEl("part" + j).className.baseVal = "";
  }
}

/* Startup */
function initApp() {

  renderCrossword(false);
  renderClues();
  resetMemory();
  resetHangman();
}

initApp();
</script>
</body>
</html>
